{# templates/partials/confirm_delete.html #}
{% extends 'base.html' %}
{% block title %}{{ page_title }} — NeverDue{% endblock %}
{% block content %}
<div class="confirm-page">
  <h1 class="confirm-page__title">{{ page_title }}</h1>
  <p class="confirm-page__text">{{ message }}</p>
  <div class="confirm-page__actions">
    <form method="post">{% csrf_token %}
      <button type="submit" class="btn-danger btn">Delete</button>
    </form>
    <a href="{{ cancel_url }}" class="btn-ghost btn">Cancel</a>
  </div>
</div>
{% endblock %}
