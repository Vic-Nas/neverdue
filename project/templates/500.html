{# templates/500.html #}
{% extends 'base.html' %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pages/dashboard.css' %}">
{% endblock %}
{% block title %}Server error — NeverDue{% endblock %}
{% block content %}
<div class="page page--narrow error-page">
  <div class="error-page__code">500</div>
  <h1 class="page__title">Something went wrong</h1>
  <p class="page__sub">An unexpected error occurred. Please try again in a moment.</p>
  <a href="{% url 'dashboard:index' %}" class="btn-primary">Go to dashboard</a>
</div>
{% endblock %}
